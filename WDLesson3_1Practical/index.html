<!DOCTYPE html>

     How can we add interactions to a web page? -->

<html>
  <head>
    <title>WD Lesson 3.1 Practical</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <style>


    </style>
  </head>
  <body>
    <script src="script.js"></script>
    <!-- Challenge 0: Create a <div> and give it a class of container and center.  Inside the <div> add an <h1> with the text "Event Listener"-->
     <div class="container center">
       <h1>Event Listener</h1>
     </div>
    <!-- Challenge 1: Give the <div> below a class of "container" -->
    <div class="container">
      <!-- Challenge 2: Add three images of your choice. -->
      <img src="https://i0.wp.com/www.eddiesaviary.com/wp-content/uploads/2014/07/IMG_2684.jpg" onclick="alert('Lineolated parakeet')">
            <img src="https://th-thumbnailer.cdn-si-edu.com/veAF6mWMblimWMXmv7zoytbU3J0=/1280x1280/filters:focal(512x385:513x386)/https://tf-cmsv2-smithsonianmag-media.s3.amazonaws.com/filer_public/2a/95/2a951379-be49-435b-b0a9-eddb9e834884/5210582753_c660d548d8_o.jpg" onclick="alert('Lovebird')">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT2dVQTly5Zb4Rs7cRH6-rW1nTyO_w1YlKJFw&s" onclick="alert('Budgie')">
      <!-- Challenge 3: Add an event listener to each of the images above in order to display an appropriate message about the image 
           using an alert when user clicks on the image.  
       -->  
       <!-- Challenges 4 - 7 are in style.css-->
    </div>
    <hr>
    <div class="translations">
      <!-- Challenge 8: Choice three words in another langauge. Place each word in a <span>.  Give each <span> a class of button
           When the user clicks on the word in the <span> offer the English translation in an alert.   -->
      <span onclick="alert('hello')">Hola</span>

    </div>
  </body>
</html>
